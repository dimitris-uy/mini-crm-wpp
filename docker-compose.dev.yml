services:
  whatsapp-service:
    build:
      context: ./packages/whatsapp-service
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./packages/whatsapp-service/src:/app/src
      - wa_data:/data
    environment:
      - NODE_ENV=development
      - DATA_DIR=/data
      - LOG_LEVEL=debug

  crm-web:
    build:
      context: ./packages/crm-web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./packages/crm-web/src:/app/src
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3002
    depends_on:
      - whatsapp-service

volumes:
  wa_data:
